# llm-mem configuration
# See docs/config.md for all options
# Re-run 'make setup' or 'llm-mem setup' to change these safely

[project]
name = "llm-mem"

[llm]
backend = "ollama"

[ollama]
model = "gemma4:26b"
endpoint = "http://localhost:11434"
timeout = 120
num_ctx = 8192

[openai_compat]
endpoint = "https://open.bigmodel.cn/api/paas/v4"
model = "glm-4-flash"
api_key_env = "LLM_MEM_API_KEY"
timeout = 120

[briefing]
max_tokens = 2000

[compaction]
enabled = true
schedule = "on_session_end"

[summarization]
chunk_size = 20
cross_session_interval = 5

[ui]
port = 9097
host = "0.0.0.0"

[sensitive_data]
enabled = true
pattern_scan = true
llm_scan = true
vault_mode = "auto"
