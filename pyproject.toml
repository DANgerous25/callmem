[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "llm-mem"
version = "0.1.0"
description = "Persistent memory for coding agents"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Dan" },
]

dependencies = [
    "pydantic>=2.0,<3.0",
    "python-ulid>=2.0,<3.0",
    "click>=8.0,<9.0",
    "httpx>=0.27,<1.0",
    "mcp>=1.0",
    "fastapi>=0.115,<1.0",
    "uvicorn[standard]>=0.30,<1.0",
    "jinja2>=3.1,<4.0",
    "cryptography>=44.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-httpx>=0.30",
    "ruff>=0.8",
    "mypy>=1.13",
    "pre-commit>=4.0",
]

embeddings = [
    "sentence-transformers>=3.0",
    "sqlite-vec>=0.1",
]

[project.scripts]
llm-mem = "llm_mem.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/llm_mem"]

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "TCH"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
